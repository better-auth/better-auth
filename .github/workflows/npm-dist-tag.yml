name: npm dist-tag

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g., better-auth, @better-auth/cli)'
        required: true
        type: string
      version:
        description: 'Version to tag (e.g., 1.4.21)'
        required: true
        type: string
      tag:
        description: 'npm dist-tag to apply (e.g., latest)'
        required: true
        type: string
        default: 'latest'

permissions: {}

jobs:
  dist-tag:
    if: github.repository_owner == 'better-auth'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Add dist-tag
        run: |
          if [[ "$TAG" == "latest" && "$VERSION" == *"-"* ]]; then
            echo "::error::Cannot tag a pre-release version ($VERSION) as latest."
            exit 1
          fi
          npm dist-tag add "${PACKAGE}@${VERSION}" "${TAG}"
        env:
          PACKAGE: ${{ inputs.package }}
          VERSION: ${{ inputs.version }}
          TAG: ${{ inputs.tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
