name: Cut Beta Release

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  cut:
    if: github.repository_owner == 'better-auth'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        if: vars.RELEASE_APP_ID != ''
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: next
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine beta branch name
        id: branch
        run: |
          VERSION=$(node -e "console.log(require('./packages/better-auth/package.json').version.replace(/-.*/, ''))")
          BRANCH="release/${VERSION}-beta"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Beta branch: $BRANCH (base version: $VERSION)"

      - name: Clean up existing beta branch if fully merged
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          if git ls-remote --exit-code origin "refs/heads/$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH already exists"
            # Check if it's been merged to main
            git fetch origin main
            if git merge-base --is-ancestor "origin/$BRANCH" origin/main 2>/dev/null; then
              echo "Branch is fully merged into main, deleting"
              git push origin --delete "$BRANCH"
            else
              echo "::error::Branch $BRANCH already exists and is not merged to main. Delete it manually or merge it first."
              exit 1
            fi
          fi

      - name: Create beta branch and switch pre-release mode
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git config user.name "better-auth-releases[bot]"
          git config user.email "273320539+better-auth-releases[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          [ -f .changeset/pre.json ] && pnpm changeset pre exit || true
          pnpm changeset pre enter beta
          git add .changeset/pre.json
          git commit -m "chore: enter beta pre-release mode"
          git push origin "$BRANCH"
          echo "Created and pushed $BRANCH"

      - name: Summary
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          VERSION: ${{ steps.branch.outputs.version }}
        run: |
          echo "### Beta branch created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`$BRANCH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Base version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Source:** \`next\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Merge PRs to \`$BRANCH\` to publish beta versions." >> "$GITHUB_STEP_SUMMARY"
          echo "The release workflow will handle versioning and publishing automatically." >> "$GITHUB_STEP_SUMMARY"
