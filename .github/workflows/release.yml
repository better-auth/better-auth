name: Release

on:
  push:
    branches:
      - main
      - next
    paths:
      - '.changeset/**'
      - '**/package.json'
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Snapshot tag (e.g. "snapshot"). Leave empty for normal release.'
        required: false
        default: ''
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
  TURBO_CACHE: remote:rw

jobs:
  release:
    if: inputs.snapshot == '' && github.repository_owner == 'better-auth'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        if: vars.RELEASE_APP_ID != ''
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Phase 1: Version (creates PR) or Publish (if no pending changesets)
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@c8bada60c408975afd1a20b3db81d6eee6789308 # v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:release
          title: 'chore: version packages'
          commit: 'chore: version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Phase 2: Auto-merge the Version Packages PR
      - name: Auto-merge Version Packages PR
        if: steps.changesets.outputs.pullRequestNumber
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: gh pr merge "$PR_NUMBER" --auto --squash --repo "$GITHUB_REPOSITORY"

      - name: Approve Version Packages PR
        if: steps.changesets.outputs.pullRequestNumber && vars.RELEASE_APPROVAL_TOKEN != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_APPROVAL_TOKEN }}
          PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        run: gh pr review "$PR_NUMBER" --approve --repo "$GITHUB_REPOSITORY"

      # Phase 3: Post-publish
      - name: Release Info
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "Published packages:"
          echo "$PUBLISHED"

      # Phase 4: Forward merge main → next
      - name: Forward merge to next
        if: steps.changesets.outputs.published == 'true' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin next || { echo "next branch does not exist, skipping"; exit 0; }

          AHEAD=$(git rev-list --count origin/next..origin/main)
          if [ "$AHEAD" -eq 0 ]; then
            echo "No new commits to sync"
            exit 0
          fi
          echo "Found $AHEAD commit(s) to sync"

          EXISTING=$(gh pr list --head main --base next --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Forward-merge PR #$EXISTING already exists"
            gh pr merge "$EXISTING" --auto --merge || true
            exit 0
          fi

          gh pr create \
            --base next \
            --head main \
            --title "chore: sync main to next" \
            --body "Automated forward merge to keep next as a superset of main." \
            || true

          PR=$(gh pr list --head main --base next --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            gh pr merge "$PR" --auto --merge || true
          fi

  snapshot:
    if: inputs.snapshot != '' && github.repository_owner == 'better-auth'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Version snapshot
        env:
          SNAPSHOT_TAG: ${{ inputs.snapshot }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm changeset version --snapshot "$SNAPSHOT_TAG"

      - name: Build
        run: pnpm build

      - name: Publish snapshot
        env:
          SNAPSHOT_TAG: ${{ inputs.snapshot }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm changeset publish --no-git-tag --tag "$SNAPSHOT_TAG"
