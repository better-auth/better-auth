name: Release

on:
  push:
    branches:
      - main
      - next
      - release/**
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Snapshot tag (e.g. "snapshot"). Leave empty for normal release.'
        required: false
        default: ''
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
  TURBO_CACHE: remote:rw
  BETTER_AUTH_TELEMETRY_ENDPOINT: ${{ vars.BETTER_AUTH_TELEMETRY_ENDPOINT }}

jobs:
  release:
    if: >
      inputs.snapshot == '' &&
      github.repository_owner == 'better-auth' &&
      (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/next' || startsWith(github.ref, 'refs/heads/release/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        if: vars.RELEASE_APP_ID != ''
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@c8bada60c408975afd1a20b3db81d6eee6789308 # v1
        with:
          version: pnpm ci:version
          publish: pnpm ci:release
          title: "chore: version packages${{ github.ref_name == 'next' && ' (beta)' || '' }}"
          commit: "chore: version packages${{ github.ref_name == 'next' && ' (beta)' || '' }}"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release Info
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "Published packages:"
          echo "$PUBLISHED"

      - name: Forward merge main to next
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "better-auth-releases[bot]"
          git config user.email "273320539+better-auth-releases[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git fetch origin next || { echo "next branch does not exist, skipping"; exit 0; }

          AHEAD=$(git rev-list --count origin/next..origin/main)
          if [ "$AHEAD" -eq 0 ]; then
            echo "No new commits to sync"
            exit 0
          fi
          echo "Found $AHEAD commit(s) to sync"

          # Check for existing sync PR
          EXISTING=$(gh pr list --head sync/main-to-next --base next --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Forward-merge PR #$EXISTING already exists"
            exit 0
          fi

          # Create sync branch from next and merge main into it
          git checkout -b sync/main-to-next origin/next

          if git merge origin/main --no-edit; then
            echo "Clean merge"
          else
            # Identify conflicting files
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U)
            VERSION_ONLY=true

            while IFS= read -r f; do
              case "$f" in
                packages/*/package.json|.changeset/pre.json|package.json|pnpm-lock.yaml) ;;
                *) VERSION_ONLY=false; break ;;
              esac
            done <<< "$CONFLICT_FILES"

            if [ "$VERSION_ONLY" = true ]; then
              echo "Resolving version conflicts (keeping next's versions)"
              while IFS= read -r f; do
                git checkout --ours "$f"
                git add "$f"
              done <<< "$CONFLICT_FILES"
              pnpm install --no-frozen-lockfile
              git add pnpm-lock.yaml
              git commit --no-edit
            else
              echo "::warning::Code conflicts detected in forward merge — creating draft PR for manual resolution"
              git merge --abort
              gh pr create \
                --base next \
                --head main \
                --title "chore: sync main to next (conflicts)" \
                --body "Automated forward merge has code conflicts that need manual resolution." \
                --draft \
                || true
              exit 0
            fi
          fi

          # Re-enter pre-release mode if needed (after a promote cycle)
          if [ ! -f .changeset/pre.json ]; then
            pnpm changeset pre enter beta
            git add .changeset/pre.json
            git commit -m "chore: re-enter beta pre-release mode"
          fi

          git push origin sync/main-to-next --force-with-lease

          gh pr create \
            --base next \
            --head sync/main-to-next \
            --title "chore: sync main to next" \
            --body "Automated forward merge to keep next as a superset of main." \
            || true

          PR=$(gh pr list --head sync/main-to-next --base next --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR" ]; then
            gh pr merge "$PR" --auto --merge --delete-branch || true
          fi

  snapshot:
    if: inputs.snapshot != '' && github.repository_owner == 'better-auth'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Version snapshot
        env:
          SNAPSHOT_TAG: ${{ inputs.snapshot }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .changeset/pre.json ]; then
            echo "::error::Snapshots are not supported on branches in pre-release mode. Use a non-beta branch."
            exit 1
          fi
          pnpm changeset version --snapshot "$SNAPSHOT_TAG"

      - name: Build
        run: pnpm build

      - name: Publish snapshot
        env:
          SNAPSHOT_TAG: ${{ inputs.snapshot }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm changeset publish --no-git-tag --tag "$SNAPSHOT_TAG"
