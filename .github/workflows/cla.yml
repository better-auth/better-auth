name: CLA

on:
  # Triggered when cla-assistant.io reports a commit status
  status: {}

permissions:
  pull-requests: write

jobs:
  label:
    # Only react to the license/cla context from cla-assistant.io
    if: github.event.context == 'license/cla'
    runs-on: ubuntu-latest
    steps:
      - name: Find associated pull requests
        id: prs
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            // Find open PRs whose HEAD matches the status event SHA
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.payload.sha}`,
            });

            // Also check by iterating open PRs if the above returns empty
            // (the head filter uses "user:ref" format, so fall back to SHA match)
            let matched = prs.filter(pr => pr.head.sha === context.payload.sha);

            if (matched.length === 0) {
              const { data: allPrs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });
              matched = allPrs.filter(pr => pr.head.sha === context.payload.sha);
            }

            return matched.map(pr => pr.number);

      - name: Update CLA labels
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumbers = ${{ steps.prs.outputs.result }};
            const state = context.payload.state; // "success", "pending", "failure", "error"

            for (const pr of prNumbers) {
              if (state === 'success') {
                // Add "CLA Signed" label
                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr,
                    labels: ['CLA Signed'],
                  });
                } catch (e) {
                  core.warning(`Failed to add label to PR #${pr}: ${e.message}`);
                }

                // Remove "CLA Not Signed" label if present
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr,
                    name: 'CLA Not Signed',
                  });
                } catch {
                  // Label may not exist on this PR — ignore
                }
              } else {
                // Add "CLA Not Signed" label
                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr,
                    labels: ['CLA Not Signed'],
                  });
                } catch (e) {
                  core.warning(`Failed to add label to PR #${pr}: ${e.message}`);
                }

                // Remove "CLA Signed" label if present
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr,
                    name: 'CLA Signed',
                  });
                } catch {
                  // Label may not exist on this PR — ignore
                }
              }
            }
