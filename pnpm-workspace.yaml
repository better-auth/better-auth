packages:
  - packages/**
  - landing
  - docs
  - e2e/**
  - test

blockExoticSubdeps: true

overrides:
  axios: <1.14.0

catalog:
  '@better-auth/utils': 0.4.0
  '@better-fetch/fetch': 1.1.21
  better-call: 2.0.3
  tsdown: 0.21.1
  typescript: ^5.9.3

catalogs:
  react19:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.4
    react-dom: ^19.2.4
  tailwind:
    '@tailwindcss/postcss': ^4.2.1
    '@tailwindcss/vite': ^4.2.1
    tailwindcss: ^4.2.1
    tailwindcss-animate: ^1.0.7
  vitest:
    '@vitest/coverage-istanbul': ^4.0.18
    '@vitest/ui': ^4.0.18
    vitest: ^4.0.18

linkWorkspacePackages: true

minimumReleaseAge: 0

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@prisma/client'
  - '@prisma/engines'
  - '@swc/core'
  - '@tsparticles/engine'
  - better-sqlite3
  - esbuild
  - less
  - msw
  - prisma
  - protobufjs
  - sharp
  - workerd

ignoredBuiltDependencies:
  - electron

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 43200
