packages:
  - packages/**
  - docs
  - e2e/**
  - test

blockExoticSubdeps: true

overrides:
  axios: <1.14.0
  node-forge: '>=1.4.0 <2'
  h3@<2: '>=1.15.9'
  brace-expansion@<2: 1.1.13
  brace-expansion@>=2 <4: 2.0.3
  brace-expansion@>=4: 5.0.5
  path-to-regexp@>=8: 8.4.0
  dompurify: '>=3.3.2 <4'
  happy-dom: '>=20.8.9 <21'

catalog:
  '@better-auth/utils': 0.4.0
  '@better-fetch/fetch': 1.1.21
  better-call: 1.3.5
  tsdown: 0.21.1
  typescript: ^5.9.3

catalogs:
  react19:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.4
    react-dom: ^19.2.4
  tailwind:
    '@tailwindcss/postcss': ^4.2.1
    tailwindcss: ^4.2.1
    tailwindcss-animate: ^1.0.7
  vitest:
    '@vitest/coverage-istanbul': ^4.0.18
    '@vitest/ui': ^4.0.18
    vitest: ^4.0.18

ignoredBuiltDependencies:
  - electron

linkWorkspacePackages: true

minimumReleaseAge: 0

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@prisma/client'
  - '@prisma/engines'
  - '@swc/core'
  - '@tsparticles/engine'
  - better-sqlite3
  - electron
  - esbuild
  - lefthook
  - less
  - msw
  - prisma
  - protobufjs
  - sharp
  - workerd

patchedDependencies:
  '@changesets/assemble-release-plan': patches/@changesets__assemble-release-plan.patch

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 43200
