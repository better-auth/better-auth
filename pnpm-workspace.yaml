catalog:
  '@better-auth/utils': 0.4.1
  '@better-fetch/fetch': 1.1.21
  better-call: 1.3.5
  kysely: ^0.29.0
  tsdown: 0.21.1
  typescript: ^5.9.3

catalogs:
  peer:
    kysely: ^0.29.0
  react19:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.4
    react-dom: ^19.2.4
  tailwind:
    '@tailwindcss/postcss': ^4.2.1
    tailwindcss: ^4.2.1
    tailwindcss-animate: ^1.0.7
  vitest:
    '@vitest/coverage-istanbul': ^4.1.5
    '@vitest/ui': ^4.1.5
    vitest: ^4.1.5

allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  '@tsparticles/engine': true
  better-sqlite3: true
  esbuild: true
  lefthook: true
  less: true
  msw: true
  prisma: true
  protobufjs: true
  sharp: true
  workerd: true
  electron: false

linkWorkspacePackages: true

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@better-auth/*'
  - '@better-fetch/fetch'
  - 'better-call'

patchedDependencies:
  '@changesets/assemble-release-plan': patches/@changesets__assemble-release-plan.patch

trustPolicy: no-downgrade

trustPolicyIgnoreAfter: 43200
